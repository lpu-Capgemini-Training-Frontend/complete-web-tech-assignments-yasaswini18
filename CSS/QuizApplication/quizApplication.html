<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Application</title>
    <link rel="stylesheet" href="./quizApplication.css">
</head>
<body>
    <header id="header">
        <h3>Quiz Application</h3>
    </header>

    <main id="main">
        <section>
            <h4>Q1.Why you guys come to the class late?</h4>
            <label for="qns01"><strong>A. </strong>Traffic</label> <input type="radio" name="first" id="qns01">
            <label for="qns101"><strong>B. </strong>Breakfast</label> <input type="radio" name="first" id="qns101">
            <label for="qns102"><strong>C. </strong>Sleep</label> <input type="radio" name="first" id="qns102">
            <label for="qns103"><strong>D. </strong>Other</label> <input type="radio" name="first" id="qns103"><br>
            <p class="correct" id="q1correct">Correct!</p>
            <p class="incorrect" id="q1wrong">Incorrect!</p>

            <h4>Q2.Why I ask so many questions?</h4>
            <label for="qns02"><strong>A. </strong>Improve your performance</label> <input type="radio" name="second" id="qns02">
            <label for="qns201"><strong>B. </strong>Make you guys bored</label> <input type="radio" name="second" id="qns201">
            <label for="qns202"><strong>C. </strong>To Disturb you guys</label><input type="radio" name="second" id="qns202">
            <label for="qns203"><strong>D. </strong>To eleminate you guys</label> <input type="radio" name="second" id="qns203"><br>
            <p class="correct" id="q2correct">Correct!</p>
            <p class="incorrect" id="q2wrong">Incorrect!</p>

            <h4>Q3.Who is the Prime Minister of India?</h4>
            <label for="qns03"><strong>A. </strong>Mr.Narendra Modi</label> <input type="radio" name="third" id="qns03">
            <label for="qns301"><strong>B. </strong>Kejriwal</label> <input type="radio" name="third" id="qns301">
            <label for="qns302"><strong>C. </strong>Harshad Mehta</label> <input type="radio" name="third" id="qns302">
            <label for="qns303"><strong>D. </strong>Rahul Gandhi</label> <input type="radio" name="third" id="qns303"><br>
            <p class="correct" id="q3correct">Correct!</p>
            <p class="incorrect" id="q3wrong">Incorrect!</p>
        </section>
    </main>

    <footer id="footer">
        <p>This is footer<p>
    </footer>
    
</body>
</html>
